# Quality gates for every PR and push to main.
# Branch protection on main should require: quality, server, armory.
name: CI

on:
    pull_request:
    push:
        branches: ["main"]
    workflow_dispatch:

concurrency:
    group: ci-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

jobs:
    quality:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "npm"
            - run: npm ci
            - name: Typecheck
              run: npm run typecheck
            - name: Lint
              run: npm run lint
            - name: Format check
              run: npm run format:check
            - name: Test (with coverage + ratcheting thresholds)
              run: npm run test:coverage
            - name: Build
              run: npm run build

    # Dependency install verification for the GraphQL gateway (tests arrive in Phase 5).
    server:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "yarn"
                  cache-dependency-path: server/yarn.lock
            - name: Install server dependencies
              run: |
                  cd server
                  yarn install --frozen-lockfile

    # Dependency install verification for the armory service (tests arrive in Phase 5).
    armory:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "yarn"
                  cache-dependency-path: services/armory/yarn.lock
            - name: Install armory dependencies
              run: |
                  cd services/armory
                  yarn install --frozen-lockfile

    # Dependabot PRs only auto-merge once every quality gate is green.
    dependabot:
        runs-on: ubuntu-latest
        needs: [quality, server, armory]
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]' }}
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Dependabot metadata
              id: metadata
              uses: dependabot/fetch-metadata@v2
              with:
                  github-token: "${{ secrets.GITHUB_TOKEN }}"
                  skip-verification: true
            - name: Enable auto-merge for Dependabot PRs
              run: gh pr merge --auto --merge "$PR_URL"
              env:
                  PR_URL: ${{github.event.pull_request.html_url}}
                  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
