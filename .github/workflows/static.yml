# Build and deploy workflow for static content to GitHub Pages.
# PR quality gates (typecheck, lint, format, test, build) live in ci.yml.
name: Build and Deploy to Pages

on:
    # Runs on pushes targeting the default branch
    push:
        branches: ["main"]

    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
    contents: read
    pages: write
    id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Setup Node.js environment
              uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: "npm"
            - run: npm ci
            - name: Build main application
              run: npm run build
              env:
                  # Vite serves the Pages build under /phasercraft/ (was Next's
                  # basePath, set via DEPLOY=production before the Vite migration).
                  VITE_BASE_URL: /phasercraft/
            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: build-files
                  path: "./dist"
                  retention-days: 1

    deploy:
        needs: build
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Setup Pages
              uses: actions/configure-pages@v5
            - name: Download build artifact
              uses: actions/download-artifact@v4
              with:
                  name: build-files
                  path: "./dist"
            - name: Upload artifact to Pages
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "./dist"
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
